<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f5d56"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bg)"/>
  <!-- Chemistry-style ring of three orbiting nodes -->
  <g fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5">
    <ellipse cx="32" cy="32" rx="24" ry="10" transform="rotate(0 32 32)"/>
    <ellipse cx="32" cy="32" rx="24" ry="10" transform="rotate(60 32 32)"/>
    <ellipse cx="32" cy="32" rx="24" ry="10" transform="rotate(120 32 32)"/>
  </g>
  <!-- Center C mark -->
  <text x="32" y="44" font-family="Arial, Helvetica, sans-serif"
        font-size="32" font-weight="800" text-anchor="middle" fill="#ffffff">C</text>
</svg>
